<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoo Tycoon: Reptiles & Ocean</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
    #game-container { width: 100%; height: 100%; position: relative; }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      font-size: 14px;
      gap: 24px;
      z-index: 10;
      pointer-events: none;
    }
    #hud .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #hud .stat-label { color: #8892b0; font-size: 12px; }
    #hud .stat-value { color: #64ffda; font-weight: 600; }
    #tile-info {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0,0,0,0.7);
      color: #ccd6f6;
      padding: 8px 14px;
      border-radius: 6px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div class="stat">
        <span class="stat-label">Tile:</span>
        <span class="stat-value" id="hud-tile">-</span>
      </div>
      <div class="stat">
        <span class="stat-label">Camera:</span>
        <span class="stat-value" id="hud-camera">0, 0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Zoom:</span>
        <span class="stat-value" id="hud-zoom">1.0x</span>
      </div>
    </div>
    <div id="tile-info">WASD / drag to pan | Scroll to zoom | Click tiles</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
